<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tip Splitter</title>
<style>
  :root {
    --bg: #0b0f17;
    --panel: #121826;
    --fg: #e8edf5;
    --muted: #9aa7bd;
    --accent: #5b8cff;
    --border: #223049;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: grid; place-items: center;
    padding: 1.5rem;
  }
  .app {
    width: 100%; max-width: 420px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 16px; padding: 1.75rem;
  }
  h1 { font-size: 1.5rem; letter-spacing: -0.01em; margin-bottom: 0.35rem; }
  .subtitle { color: var(--muted); font-size: 0.95rem; margin-bottom: 1.4rem; }
  label { display: block; font-size: 0.85rem; color: var(--muted); margin: 0.9rem 0 0.35rem; }
  input {
    width: 100%; font: inherit; color: var(--fg);
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.65rem 0.75rem;
  }
  input:focus { outline: none; border-color: var(--accent); }
  .row { display: flex; gap: 0.75rem; }
  .row > * { flex: 1; }
  .tips { display: flex; gap: 0.5rem; margin-top: 0.35rem; }
  .tips button {
    flex: 1; font: inherit; cursor: pointer;
    background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 10px; padding: 0.55rem 0;
  }
  .tips button.active { border-color: var(--accent); color: var(--accent); }
  .result {
    margin-top: 1.5rem; padding: 1.1rem 1.25rem;
    background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
    display: grid; gap: 0.6rem;
  }
  .result .line { display: flex; align-items: baseline; justify-content: space-between; }
  .result .label { color: var(--muted); font-size: 0.85rem; }
  .result .value { font-size: 1.15rem; font-weight: 600; font-variant-numeric: tabular-nums; }
  .result .line.total .value { font-size: 1.7rem; color: var(--accent); }
</style>
</head>
<body>
  <main class="app">
    <h1>Tip Splitter</h1>
    <p class="subtitle">Split a bill and tip evenly across the table.</p>

    <label for="bill">Bill amount</label>
    <input id="bill" type="number" min="0" step="0.01" value="86.40" inputmode="decimal" />

    <label>Tip percentage</label>
    <div class="tips" id="tips">
      <button data-tip="10">10%</button>
      <button data-tip="15" class="active">15%</button>
      <button data-tip="18">18%</button>
      <button data-tip="20">20%</button>
    </div>

    <label for="people">Number of people</label>
    <input id="people" type="number" min="1" step="1" value="4" inputmode="numeric" />

    <div class="result">
      <div class="line">
        <span class="label">Tip amount</span>
        <span class="value" id="tipOut">0.00</span>
      </div>
      <div class="line total">
        <span class="label">Each person pays</span>
        <span class="value" id="perOut">0.00</span>
      </div>
    </div>
  </main>

  <script>
    (function () {
      var bill = document.getElementById("bill");
      var people = document.getElementById("people");
      var tips = document.getElementById("tips");
      var tipOut = document.getElementById("tipOut");
      var perOut = document.getElementById("perOut");
      var tipPct = 15;

      function render() {
        var amount = parseFloat(bill.value) || 0;
        var n = Math.max(1, parseInt(people.value, 10) || 1);
        var tip = amount * (tipPct / 100);
        var perPerson = (amount + tip) / n;
        tipOut.textContent = tip.toFixed(2);
        perOut.textContent = perPerson.toFixed(2);
      }

      tips.addEventListener("click", function (e) {
        var btn = e.target.closest("button");
        if (!btn) return;
        tipPct = parseFloat(btn.getAttribute("data-tip"));
        Array.prototype.forEach.call(tips.children, function (b) {
          b.classList.toggle("active", b === btn);
        });
        render();
      });

      bill.addEventListener("input", render);
      people.addEventListener("input", render);
      render();
    })();
  </script>
</body>
</html>
