#
# Declare infrastructure; the platform provisions it and injects connection
# details as env vars. Nine needs: database, cache, kv, queue, pubsub, vector,
# object_storage, disk, ai. Simplest form is `true`.
#
# needs:
#   # database 芒聙聰 MongoDB. Injects DATABASE_MONGODB_URL (+ legacy MONGODB_URL).
#   #   true | pool | dedicated | { tier: external, secret: MY_DB }
#   database: true
#   # cache 芒聙聰 Redis, LRU eviction (derived data). Injects CACHE_REDIS_URL (+ REDIS_URL).
#   #   true | redis | { engine: external, secret: MY_REDIS_URL }
#   cache: true
#   # kv 芒聙聰 Redis, no eviction (durable: flags, idempotency). Injects KV_REDIS_URL.
#   kv: true
#   # queue 芒聙聰 Redis job-queue substrate (BullMQ). Injects QUEUE_REDIS_URL.
#   queue: true
#   # pubsub 芒聙聰 Redis broadcast pub/sub. Injects PUBSUB_REDIS_URL.
#   pubsub: true
#   # vector 芒聙聰 pgvector on Postgres. Injects VECTOR_PGVECTOR_URL (+ PGVECTOR_URL).
#   #   true | pgvector | { engine: pgvector, dim: 1536 }
#   vector: pgvector
#   # object_storage 芒聙聰 GCS bucket. Injects OBJECT_STORAGE_GCS_BUCKET, _GCS_REGION.
#   #   true | { size: 10Gi }
#   object_storage: true
#   # disk 芒聙聰 persistent FS mount (PVC). Injects DISK_PATH. Pins to 1 replica.
#   #   true | { size: 1Gi, mount: /var/data }  (forbidden: /proc /sys /dev)
#   disk: true
#   # ai 芒聙聰 AI Gateway via @cloudgrid-io/runtime. Injects RUNTIME_GATEWAY_URL. true | false.
#   ai: true


# 芒聰聙芒聰聙芒聰聙 INTER-ENTITY COMMUNICATION 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙

