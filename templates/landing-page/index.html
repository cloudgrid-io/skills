<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{PRODUCT_NAME}}</title>
<style>
  :root {
    --bg: #0b0f17;
    --panel: #121826;
    --fg: #e8edf5;
    --muted: #9aa7bd;
    --accent: #5b8cff;
    --border: #223049;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  header, section, footer { padding: clamp(2rem, 6vw, 5rem) clamp(1.25rem, 6vw, 6rem); }
  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.1rem clamp(1.25rem, 6vw, 6rem);
    border-bottom: 1px solid var(--border);
  }
  nav .brand { font-weight: 600; letter-spacing: -0.01em; }
  nav a { color: var(--muted); text-decoration: none; }
  .hero { text-align: center; display: grid; gap: 1.25rem; place-items: center; }
  .hero h1 {
    font-size: clamp(2.4rem, 6vw, 4.5rem);
    line-height: 1.05; letter-spacing: -0.02em; max-width: 20ch;
  }
  .hero p { font-size: clamp(1.05rem, 2.4vw, 1.5rem); color: var(--muted); max-width: 48ch; }
  .cta {
    display: inline-block; margin-top: 0.5rem;
    background: var(--accent); color: #fff; text-decoration: none;
    padding: 0.85rem 1.6rem; border-radius: 10px; font-weight: 600;
  }
  .cta:hover { filter: brightness(1.08); }
  .features {
    display: grid; gap: 1.25rem;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    border-top: 1px solid var(--border);
  }
  .feature {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.5rem;
  }
  .feature h3 { font-size: 1.15rem; margin-bottom: 0.5rem; letter-spacing: -0.01em; }
  .feature p { color: var(--muted); }
  .closing { text-align: center; border-top: 1px solid var(--border); display: grid; gap: 1.25rem; place-items: center; }
  .closing h2 { font-size: clamp(1.8rem, 4.5vw, 3rem); letter-spacing: -0.01em; max-width: 24ch; }
  footer { border-top: 1px solid var(--border); color: var(--muted); font-size: 0.9rem; text-align: center; }
</style>
</head>
<body>
  <nav>
    <span class="brand">{{PRODUCT_NAME}}</span>
    <a class="cta" href="{{CTA_HREF}}">{{CTA_LABEL}}</a>
  </nav>

  <header class="hero">
    <h1>{{HERO_HEADLINE}}</h1>
    <p>{{HERO_SUBHEAD}}</p>
    <a class="cta" href="{{CTA_HREF}}">{{CTA_LABEL}}</a>
  </header>

  <section class="features">
    <!-- FEATURES_START -->
    <div class="feature">
      <h3>{{FEATURE_1_TITLE}}</h3>
      <p>{{FEATURE_1_BODY}}</p>
    </div>
    <div class="feature">
      <h3>{{FEATURE_2_TITLE}}</h3>
      <p>{{FEATURE_2_BODY}}</p>
    </div>
    <div class="feature">
      <h3>{{FEATURE_3_TITLE}}</h3>
      <p>{{FEATURE_3_BODY}}</p>
    </div>
    <!-- Add more <div class="feature">...</div> blocks as needed. -->
    <!-- FEATURES_END -->
  </section>

  <section class="closing">
    <h2>{{CLOSING_HEADLINE}}</h2>
    <a class="cta" href="{{CTA_HREF}}">{{CTA_LABEL}}</a>
  </section>

  <footer>{{FOOTER_TEXT}}</footer>
</body>
</html>
